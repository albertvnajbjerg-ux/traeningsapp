<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Træn">
    <title>Træn</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div class="topbar-left">
          <div class="mascot" aria-hidden="true">
            <svg viewBox="0 0 512 512" width="42" height="42" fill="none">
              <rect x="166" y="180" width="180" height="152" rx="40" fill="var(--accent)"/>
              <rect x="80" y="198" width="86" height="116" rx="24" fill="var(--accent-2)" opacity="0.9"/>
              <rect x="346" y="198" width="86" height="116" rx="24" fill="var(--accent-2)" opacity="0.9"/>
              <circle cx="196" cy="248" r="16" fill="#fff"/>
              <circle cx="316" cy="248" r="16" fill="#fff"/>
              <circle cx="196" cy="248" r="7" fill="var(--bg)"/>
              <circle cx="316" cy="248" r="7" fill="var(--bg)"/>
              <circle cx="176" cy="270" r="10" fill="#fff" opacity="0.25"/>
              <circle cx="336" cy="270" r="10" fill="#fff" opacity="0.25"/>
              <path d="M224 276 Q256 314 288 276" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
              <ellipse cx="256" cy="298" rx="12" ry="7" fill="var(--danger)" opacity="0.6"/>
            </svg>
          </div>
          <div>
            <p class="eyebrow">Personlig træning</p>
            <h1>Træn</h1>
          </div>
        </div>
        <button class="icon-button" id="installButton" type="button" title="Installer">
          <span>+</span>
        </button>
      </section>

      <nav class="tabs" aria-label="App visninger">
        <button class="tab is-active" data-view="setup" type="button">Profil</button>
        <button class="tab" data-view="plan" type="button">Plan</button>
        <button class="tab" data-view="progress" type="button">Status</button>
      </nav>

      <section class="view is-active" id="setupView">
        <form class="panel profile-grid" id="profileForm">
          <label>
            <span>Alder</span>
            <input id="age" name="age" type="number" min="10" max="90" value="28" required>
            <small>Appen laver kun planer fra 10 år og op. Yngre børn skal træne med en voksen/træner.</small>
          </label>
          <label>
            <span>Vægt (kg)</span>
            <input id="weight" name="weight" type="number" min="35" max="250" value="82" required>
            <small>Bruges til BMI og et groft kalorie-estimat.</small>
          </label>
          <label>
            <span>Højde (cm)</span>
            <input id="height" name="height" type="number" min="120" max="230" value="182" required>
            <small>Bruges sammen med vægt til at justere belastningen.</small>
          </label>
          <label>
            <span>Dage om ugen</span>
            <input id="days" name="days" type="range" min="2" max="6" value="4">
            <strong id="daysLabel">4 dage</strong>
            <small>Fordeler træning og hviledage over ugen.</small>
          </label>
          <label>
            <span>Træningstid</span>
            <select id="duration" name="duration">
              <option value="10">10 min</option>
              <option value="15">15 min</option>
              <option value="20">20 min</option>
              <option value="25">25 min</option>
              <option value="30">30 min</option>
              <option value="45" selected>45 min</option>
              <option value="60">60 min</option>
              <option value="75">75 min</option>
            </select>
            <small>Kortere pas får færre øvelser og lidt skarpere fokus.</small>
          </label>
          <label>
            <span>Mål</span>
            <select id="goal" name="goal">
              <option value="strength">Styrke</option>
              <option value="muscle" selected>Muskelmasse</option>
              <option value="fatloss">Fedtforbrænding</option>
              <option value="fitness">Kondition</option>
            </select>
            <small>Styrer reps, pauser og hvilke øvelser planen prioriterer.</small>
          </label>
          <label>
            <span>Niveau</span>
            <select id="level" name="level">
              <option value="beginner">Begynder</option>
              <option value="intermediate" selected>Øvet</option>
              <option value="advanced">Avanceret</option>
            </select>
            <small>Bestemmer hvor mange sæt planen starter med.</small>
          </label>
          <label>
            <span>Udstyr</span>
            <select id="equipment" name="equipment">
              <option value="bodyweight">Kun kropsvægt</option>
              <option value="dumbbells">Håndvægte</option>
              <option value="gym" selected>Fitnesscenter</option>
            </select>
            <small>Vælger øvelser, der passer til det du faktisk har.</small>
          </label>
          <p class="form-message" id="formMessage" role="alert"></p>
          <button class="primary-action" type="submit">Lav min plan</button>
        </form>

        <section class="insights">
          <article>
            <span>BMI</span>
            <strong id="bmiValue">24.8</strong>
            <p id="bmiText">Normal vægt</p>
          </article>
          <article>
            <span>Fokus</span>
            <strong id="focusValue">Hypertrofi</strong>
            <p>Planen justerer reps, sæt og pause.</p>
          </article>
        </section>
      </section>

      <section class="view" id="planView">
        <div class="plan-header">
          <div>
            <p class="eyebrow">Denne uge</p>
            <h2 id="planTitle">4-dages hypertrofi</h2>
          </div>
          <button class="secondary-action" id="regenerateButton" type="button">Regenerer</button>
        </div>
        <div class="week-summary panel" id="weekSummary" aria-live="polite"></div>
        <div class="calendar-grid" id="calendarGrid" aria-label="Ugekalender"></div>
        <div class="week-strip" id="weekStrip"></div>
        <div class="workout-card" id="workoutCard"></div>
      </section>

      <section class="view" id="progressView">
        <div class="panel">
          <div class="progress-head">
            <div>
              <p class="eyebrow">Din rytme</p>
              <h2 id="completionTitle">0 af 4 pas</h2>
            </div>
            <button class="secondary-action" id="resetWeekButton" type="button">Nulstil uge</button>
          </div>
          <div class="progress-stats">
            <div class="progress-stat streak">
              <span class="progress-stat-value" id="streakValue">0 dage</span>
              <span class="progress-stat-label">Stribe</span>
            </div>
            <div class="progress-stat xp">
              <span class="progress-stat-value" id="xpValue">0 XP</span>
              <span class="progress-stat-label">Point</span>
            </div>
            <div class="progress-stat">
              <span class="progress-stat-value" id="pasValue">0</span>
              <span class="progress-stat-label">Gennemført</span>
            </div>
          </div>
          <div class="motivation-banner" id="motivationBanner" hidden></div>
          <div class="meter"><span id="meterFill"></span></div>
          <div class="stats-grid">
            <article>
              <span>Volumen</span>
              <strong id="volumeStat">0 sæt</strong>
            </article>
            <article>
              <span>Kalorie-estimat</span>
              <strong id="calorieStat">0 kcal</strong>
            </article>
          </div>
          <label class="notes-label">
            <span>Noter til næste plan</span>
            <textarea id="notes" rows="5" placeholder="Fx mere ben, mindre løb, øvelse jeg ikke kan lide..."></textarea>
            <small>Noterne gemmes kun på din telefon og kan hjælpe dig med næste uge.</small>
          </label>
          <div class="button-row">
            <button class="secondary-action" id="exportButton" type="button">Eksportér</button>
            <label class="file-action">
              Importer
              <input id="importFile" type="file" accept="application/json">
            </label>
          </div>
        </div>
      </section>
    </main>

    <template id="exerciseTemplate">
      <article class="exercise">
        <div>
          <strong class="exercise-name"></strong>
          <span class="exercise-meta"></span>
        </div>
        <div class="exercise-controls">
          <button type="button" class="tiny-button decrease">-</button>
          <button type="button" class="tiny-button increase">+</button>
          <button type="button" class="tiny-button swap">Byt</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
